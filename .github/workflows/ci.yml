name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            python/requirements.txt
            python/dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install -r python/dev-requirements.txt
          pip install pytest pytest-cov ruff

      - name: Show environment
        run: |
          python --version
          pip --version

      - name: Lint
        run: |
          ruff check python tests

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          pytest tests \
            --cov=python \
            --cov-report=term-missing \
            --cov-report=xml:docs/evaluation/coverage-report/coverage.xml \
            --cov-report=html:docs/evaluation/coverage-report/coverage \
            --cov-fail-under=70 \
            --junitxml=docs/evaluation/coverage-report/test-results.xml

      - name: Upload test reports and coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: docs/evaluation/coverage-report/
          retention-days: 7