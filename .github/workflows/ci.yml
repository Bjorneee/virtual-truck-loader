name: CI
permissions:
  contents: write

on:
  push:
    branches:
      - main
      - develop
      - feature/**
    paths-ignore:
      - README.md
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            python/requirements.txt
            python/dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install -r python/dev-requirements.txt
          pip install pytest pytest-cov ruff

      - name: Show environment
        run: |
          python --version
          pip --version

      - name: Lint
        run: |
          ruff check python tests

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          pytest tests \
            --cov=python \
            --cov-report=term-missing \
            --cov-report=xml:docs/evaluation/coverage-report/coverage.xml \
            --cov-report=html:docs/evaluation/coverage-report/coverage \
            --cov-report=markdown:docs/evaluation/coverage-report/report.md \
            --cov-fail-under=70 \
            --junitxml=docs/evaluation/coverage-report/test-results.xml
      
      - name: Extract coverage from coverage.xml
        id: coverage
        shell: bash
        run: |
          COVERAGE=$(python - <<'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse("docs/evaluation/coverage-report/coverage.xml")
          root = tree.getroot()
          rate = float(root.attrib["line-rate"]) * 100
          print(round(rate))
          EOF
          )

          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Generate coverage badge
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}

          if [ "$COVERAGE" -ge 70 ]; then COLOR="brightgreen";
          elif [ "$COVERAGE" -ge 50 ]; then COLOR="yellow";
          else COLOR="red"; fi

          echo "![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR})" > coverage-badge.md

      - name: Upload test reports and coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: |
            docs/evaluation/coverage-report/coverage-badge.md
          retention-days: 7

      - name: Update README coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}

          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$COVERAGE" -ge 70 ]; then COLOR="green";
          elif [ "$COVERAGE" -ge 50 ]; then COLOR="yellow";
          else COLOR="red"; fi

          BADGE="![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR})"

          python - <<EOF
          from pathlib import Path

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")

          start = "<!-- coverage-badge-start -->"
          end = "<!-- coverage-badge-end -->"
          badge = """$BADGE"""

          block = f"{start}\\n{badge}\\n{end}"

          if start in text and end in text:
              before = text.split(start)[0]
              after = text.split(end)[1]
              text = before + block + after
          else:
              text = block + "\\n\\n" + text

          readme.write_text(text, encoding="utf-8")
          EOF

      - name: Commit updated coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet && echo "No badge changes" && exit 0

          git commit -m "Update coverage badge"
          git push origin main