name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            python/requirements.txt
            python/dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install -r python/dev-requirements.txt
          pip install pytest pytest-cov ruff

      - name: Show environment
        run: |
          python --version
          pip --version

      - name: Lint
        run: |
          ruff check python tests

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          pytest tests \
            --cov=python \
            --cov-report=term-missing \
            --cov-report=xml:docs/evaluation/coverage-report/coverage.xml \
            --cov-report=html:docs/evaluation/coverage-report/coverage \
            --cov-report=markdown:docs/evaluation/coverage-report/report.md \
            --cov-fail-under=70 \
            --junitxml=docs/evaluation/coverage-report/test-results.xml
      
      - name: Extract coverage from coverage.xml
        id: coverage
        shell: bash
        run: |
          COVERAGE=$(python - <<'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse("docs/evaluation/coverage-report/coverage.xml")
          root = tree.getroot()
          rate = float(root.attrib["line-rate"]) * 100
          print(round(rate))
          EOF
          )

          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Generate coverage badge
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}

          if [ "$COVERAGE" -ge 70 ]; then COLOR="brightgreen";
          elif [ "$COVERAGE" -ge 50 ]; then COLOR="yellow";
          else COLOR="red"; fi

          echo "![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR})" > coverage-badge.md

      - name: Upload test reports and coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: |
            docs/evaluation/coverage-report/coverage-badge.md
          retention-days: 7