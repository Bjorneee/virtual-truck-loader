name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  package:
    name: Package backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            python/requirements.txt
            python/dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install -r python/dev-requirements.txt
          pip install pytest pytest-cov

      - name: Run tests before packaging
        env:
          PYTHONPATH: .
        run: |
          pytest tests --cov=python --cov-fail-under=70

      - name: Build deployable package
        run: |
          mkdir -p dist
          zip -r dist/vtl-backend.zip python docs README.md

      - name: Upload deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: vtl-backend-package
          path: dist/vtl-backend.zip
          retention-days: 7

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: staging

    steps:
      - name: Download deployable artifact
        uses: actions/download-artifact@v5
        with:
          name: vtl-backend-package
          path: dist

      - name: Inspect artifact
        run: |
          ls -R dist

      - name: Deploy to staging server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            mkdir -p ~/vtl-deploy

      - name: Copy artifact to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "dist/vtl-backend.zip"
          target: "~/vtl-deploy"

      - name: Unpack and restart app on staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ~/vtl-deploy
            unzip -o vtl-backend.zip -d current
            # Replace these with your real commands:
            # python3 -m venv .venv
            # source .venv/bin/activate
            # pip install -r current/python/requirements.txt
            # sudo systemctl restart vtl-backend
            echo "Deploy completed"